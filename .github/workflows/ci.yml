name: ci
on:
  pull_request:
    types: [labeled, synchronize, reopened]
  workflow_dispatch: {}        # on-demand full ship build

concurrency:
  # same PR re-trigger cancels the in-flight run; different PRs => different
  # groups => run in parallel up to runner-pool capacity
  group: ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  unit-gate:
    if: >
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'ci:run')
    runs-on: [self-hosted, light]      # on-demand triton slot, 3G cap
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - id: mods
        name: Resolve changed Gradle modules
        run: |
          base="${{ github.event.pull_request.base.sha }}"
          mapfile -t paths < <(git diff --name-only "$base"...HEAD || true)
          declare -A seen; tasks=()
          for p in "${paths[@]}"; do
            # "<a>/src/.." -> :a ; "<a>/<b>/src/.." -> :a:b   (tune for deeper modules)
            mod=$(printf '%s\n' "$p" \
              | sed -nE 's#^(([A-Za-z0-9_.-]+)(/[A-Za-z0-9_.-]+)?)/src/.*#\1#p' | tr '/' ':')
            [ -z "$mod" ] && continue
            [ -n "${seen[$mod]:-}" ] && continue
            seen[$mod]=1
            tasks+=( ":$mod:testDemoDebugUnitTest" ":$mod:verifyRoborazziDemoDebug" )
          done
          if [ ${#tasks[@]} -eq 0 ]; then
            echo "tasks=" >> "$GITHUB_OUTPUT"
          else
            echo "tasks=${tasks[*]}" >> "$GITHUB_OUTPUT"
          fi
      - name: Unit + UI (JVM, changed modules)
        if: steps.mods.outputs.tasks != ''
        run: ./gradlew ${{ steps.mods.outputs.tasks }} --no-daemon --stacktrace

  ship-gate:
    if: github.event_name == 'workflow_dispatch'
    runs-on: [self-hosted, ship]       # on-demand triton slot, 6.5G cap, runs alone
    steps:
      - uses: actions/checkout@v4
      - name: Full assemble + full suite
        run: |
          ./gradlew assembleDemoDebug testDemoDebugUnitTest \
                    verifyRoborazziDemoDebug lintDemoDebug --no-daemon --stacktrace
